<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLID | Architecture of Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Paleta Vencedora: Cashmere & Bone */
            --gold-light: #E8D5C4; 
            --gold-base: #B8A38E;  
            --gold-deep: #8D7A65;  
            --color-gunmetal: #2C2C2C;
            --color-cashmere: #F5F5F3;
            
            --mouse-x: 50%;
            --mouse-y: 50%;
            --parallax-x: 0px;
            --parallax-y: 0px;
        }

        /* Foundation: Metal Polido Dinâmico */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                circle at var(--mouse-x) var(--mouse-y),
                var(--gold-light) 0%,
                var(--gold-base) 35%,
                var(--gold-deep) 100%
            );
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            overflow: hidden;
            cursor: none;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
            will-change: transform, opacity;
        }

        /* Monograma 45º com Paralaxe */
        .monogram-container {
            position: absolute;
            width: 220%;
            height: 220%;
            top: -60%;
            left: -60%;
            background-image: url('https://glid.carrd.co/assets/images/image03.png?v=951bca55');
            background-size: 90px;
            background-repeat: repeat;
            transform: rotate(-45deg) translate(var(--parallax-x), var(--parallax-y));
            pointer-events: none;
            transition: transform 0.2s ease-out;
            will-change: transform;
        }

        /* Camada Base: Garantindo textura global */
        .base-mono {
            opacity: 0.05; /* Aumentado para garantir visibilidade nos cantos escuros */
        }

        /* Camada Inteligente: Lanterna Ultra-Wide */
        .reveal-mono {
            opacity: 0.18; 
            /* Raio expandido de 400px para 800px para cobrir os cantos com perfeição */
            -webkit-mask-image: radial-gradient(800px circle at calc(var(--mouse-x) + var(--parallax-x)) calc(var(--mouse-y) + var(--parallax-y)), black 15%, transparent 75%);
            mask-image: radial-gradient(800px circle at calc(var(--mouse-x) + var(--parallax-x)) calc(var(--mouse-y) + var(--parallax-y)), black 15%, transparent 75%);
            z-index: 2;
        }

        .lantern-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                800px circle at var(--mouse-x) var(--mouse-y),
                rgba(232, 213, 196, 0.4),
                transparent 60% /* Dissipação mais suave */
            );
            pointer-events: none;
            z-index: 1;
            will-change: background;
        }

        /* Logo com Sombra Dinâmica - Centro Absoluto */
        .logo-container {
            position: relative;
            /* Responsivo: Cresce com a tela, não perde proporção */
            width: clamp(200px, 45vw, 280px);
            margin-bottom: 2.5rem;
            z-index: 10;
            transition: filter 0.1s ease-out, transform 0.1s ease-out;
            will-change: filter, transform;
            transform-style: preserve-3d;
        }

        .logo-base {
            width: 100%;
            height: auto;
            display: block;
        }

        .logo-shimmer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                110deg,
                transparent 20%,
                rgba(255, 255, 255, 0.6) 50%,
                transparent 80%
            );
            background-size: 200% 100%;
            -webkit-mask-image: url('https://glid.carrd.co/assets/images/image03.png?v=951bca55');
            mask-image: url('https://glid.carrd.co/assets/images/image03.png?v=951bca55');
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            animation: metallicSweep 6s infinite ease-in-out;
        }

        @keyframes metallicSweep {
            0% { background-position: 200% 0; opacity: 0; }
            10% { opacity: 1; }
            35% { background-position: -200% 0; opacity: 1; }
            50%, 100% { background-position: -200% 0; opacity: 0; }
        }

        /* Botão Magnético de Elite - Centro Inferior */
        .mag-wrap {
            padding: 30px;
            z-index: 20;
        }

        .elite-btn {
            background: transparent;
            border: 1px solid rgba(44, 44, 44, 0.15);
            color: var(--color-gunmetal);
            padding: clamp(0.8rem, 2vh, 1.1rem) clamp(1.8rem, 5vw, 3rem);
            font-size: clamp(9px, 2.5vw, 11px);
            text-transform: uppercase;
            letter-spacing: 0.6em;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            background-color: rgba(245, 245, 243, 0.05);
            backdrop-filter: blur(2px);
            cursor: pointer;
        }

        .elite-btn:hover {
            border-color: rgba(44, 44, 44, 0.4);
            letter-spacing: 0.8em;
            transform: scale(1.02);
            background-color: rgba(44, 44, 44, 0.08);
            backdrop-filter: blur(8px);
            color: var(--color-gunmetal);
        }

        /* Tipografia de Topo - Absolutamente Fixa e Centralizada */
        .identity-text {
            position: absolute;
            /* Espaçamento fluido: adapta-se a telemóveis e monitores grandes */
            top: clamp(1.5rem, 4vh, 3rem);
            left: 0;
            width: 100%;
            text-align: center;
            color: var(--color-gunmetal);
            opacity: 0.5;
            font-size: clamp(8px, 2.2vw, 9px);
            text-transform: uppercase;
            letter-spacing: 1em;
            font-weight: 400;
            font-family: 'Georgia', serif; 
            z-index: 10;
        }

        .stitch-container {
            position: relative;
            width: 120px;
            height: 1px;
            background-color: rgba(44, 44, 44, 0.08); 
            overflow: hidden;
            margin-bottom: 3.5rem;
            z-index: 10;
        }

        .stitch-line {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--color-cashmere);
            box-shadow: 0 0 12px var(--color-cashmere);
            animation: stitchFlow 4s infinite ease-in-out;
        }

        @keyframes stitchFlow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Cursor de Inspeção */
        .custom-cursor {
            width: 25px;
            height: 25px;
            border: 1px solid var(--color-gunmetal);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background 0.3s, opacity 0.5s ease;
            opacity: 0; 
        }

        /* Regras de Adaptação Mobile (Telemóveis) */
        @media (max-width: 768px) {
            .custom-cursor { display: none !important; }
            #preloader { cursor: auto; }
            .mag-wrap { padding: 15px; }
            
            /* Aumenta nitidez do fundo no telemóvel */
            .monogram-container { background-size: 75px !important; }
            .base-mono { opacity: 0.07 !important; }
            .reveal-mono { opacity: 0.25 !important; }
        }

        /* Ritual de Saída */
        .exit-ritual {
            transform: scale(1.1) !important;
            opacity: 0 !important;
            filter: blur(10px);
            pointer-events: none;
        }
    </style>
</head>
<body class="m-0 bg-[#F5F5F3] overflow-hidden">

    <!-- Cursor interativo -->
    <div class="custom-cursor" id="cursor"></div>

    <!-- PRELOADER DE ELITE -->
    <div id="preloader">
        <!-- Inteligência de Marca D'água Dinâmica -->
        <div class="monogram-container base-mono" id="monogram-base"></div>
        <div class="monogram-container reveal-mono" id="monogram-reveal"></div>
        
        <div class="lantern-glow"></div>

        <!-- Cabeçalho (Fixo no Topo com Clamp) -->
        <span class="identity-text italic">Elite Front-end Atelier</span>

        <!-- Corpo Principal (Centro Absoluto) -->
        <div class="flex flex-col items-center justify-center">
            
            <div class="logo-container" id="logo-box">
                <img src="https://glid.carrd.co/assets/images/image03.png?v=951bca55" alt="GLID Logo" class="logo-base">
                <div class="logo-shimmer"></div>
            </div>
            
            <div class="stitch-container">
                <div class="stitch-line"></div>
            </div>
            
            <div class="mag-wrap" id="mag-area">
                <button type="button" class="elite-btn" id="protocol-btn">
                    Iniciar Protocolo
                </button>
            </div>
        </div>
    </div>

    <!-- CONTEÚDO FINAL DO TEU SITE -->
    <main id="main-content" class="min-h-screen flex flex-col items-center justify-center p-10 opacity-0 pointer-events-none transition-opacity duration-1000 ease-in-out">
        <div class="text-center max-w-2xl">
            <h1 style="font-family: 'Georgia', serif;" class="text-[clamp(12px,4vw,16px)] uppercase tracking-[1.5em] text-[#2C2C2C] mb-8">
                Draft Protocol Active
            </h1>
            <div class="w-16 h-[1px] bg-[#2C2C2C] mx-auto opacity-20 mb-8"></div>
            <p class="text-[#2C2C2C] font-light leading-relaxed opacity-60 text-[clamp(12px,3vw,16px)]">
                O front-end de elite foi revelado. Podes construir o resto do teu site a partir desta secção.
            </p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const preloader = document.getElementById('preloader');
            const logoBox = document.getElementById('logo-box');
            const cursor = document.getElementById('cursor');
            const magArea = document.getElementById('mag-area');
            const btn = document.getElementById('protocol-btn');
            const mainContent = document.getElementById('main-content');

            // Estado da Automação
            let isAutonomous = true;

            // Função de Animação Autônoma
            function autonomousLoop() {
                if (!isAutonomous) return;

                const time = Date.now() * 0.001; 
                const winW = window.innerWidth;
                const winH = window.innerHeight;

                const percentX = 50 + 35 * Math.sin(time * 0.7); 
                const percentY = 50 + 15 * Math.sin(time * 1.4);

                preloader.style.setProperty('--mouse-x', `${percentX}%`);
                preloader.style.setProperty('--mouse-y', `${percentY}%`);

                const absX = (percentX / 100) * winW;
                const absY = (percentY / 100) * winH;

                const moveX = (absX - winW / 2) * -0.05;
                const moveY = (absY - winH / 2) * -0.05;
                preloader.style.setProperty('--parallax-x', `${moveX}px`);
                preloader.style.setProperty('--parallax-y', `${moveY}px`);

                // 3D Tilt & Profundidade da Sombra (Autónomo)
                const normX = (absX - winW / 2) / (winW / 2);
                const normY = (absY - winH / 2) / (winH / 2);
                
                const shadowX = normX * 30; // Distância da sombra
                const shadowY = normY * 30;
                const tiltX = normX * 12; // Rotação máxima de 12 graus
                const tiltY = -normY * 12;

                logoBox.style.filter = `drop-shadow(${-shadowX}px ${-shadowY}px 25px rgba(0,0,0,0.15))`;
                logoBox.style.transform = `perspective(1000px) rotateX(${tiltY}deg) rotateY(${tiltX}deg)`;

                requestAnimationFrame(autonomousLoop);
            }

            requestAnimationFrame(autonomousLoop);

            // Função Modo Manual (Responsivo)
            const handleMove = (e) => {
                const winW = window.innerWidth;
                const winH = window.innerHeight;

                if (isAutonomous) {
                    isAutonomous = false;
                    if (winW > 768 && cursor) cursor.style.opacity = '1'; 
                }

                let x, y;
                
                if (e.type.includes('touch')) {
                    if (!e.touches || e.touches.length === 0) return;
                    x = e.touches[0].clientX;
                    y = e.touches[0].clientY;
                } else {
                    x = e.clientX;
                    y = e.clientY;
                }
                
                if (x !== undefined && y !== undefined) {
                    const percentX = (x / winW) * 100;
                    const percentY = (y / winH) * 100;
                    
                    preloader.style.setProperty('--mouse-x', `${percentX}%`);
                    preloader.style.setProperty('--mouse-y', `${percentY}%`);
                    
                    const moveX = (x - winW / 2) * -0.05;
                    const moveY = (y - winH / 2) * -0.05;
                    preloader.style.setProperty('--parallax-x', `${moveX}px`);
                    preloader.style.setProperty('--parallax-y', `${moveY}px`);

                    // 3D Tilt & Profundidade da Sombra (Manual)
                    const normX = (x - winW / 2) / (winW / 2);
                    const normY = (y - winH / 2) / (winH / 2);
                    
                    const shadowX = normX * 30;
                    const shadowY = normY * 30;
                    const tiltX = normX * 12;
                    const tiltY = -normY * 12;

                    logoBox.style.filter = `drop-shadow(${-shadowX}px ${-shadowY}px 25px rgba(0,0,0,0.15))`;
                    logoBox.style.transform = `perspective(1000px) rotateX(${tiltY}deg) rotateY(${tiltX}deg)`;

                    if (winW > 768) {
                        cursor.style.left = x + 'px';
                        cursor.style.top = y + 'px';

                        const rect = magArea.getBoundingClientRect();
                        const centerX = rect.left + rect.width / 2;
                        const centerY = rect.top + rect.height / 2;
                        const dist = Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2));

                        if (dist < 150) {
                            const attractX = (x - centerX) * 0.4;
                            const attractY = (y - centerY) * 0.4;
                            btn.style.transform = `translate(${attractX}px, ${attractY}px)`;
                            cursor.style.width = '60px';
                            cursor.style.height = '60px';
                            cursor.style.background = 'rgba(44, 44, 44, 0.03)';
                        } else {
                            btn.style.transform = `translate(0, 0)`;
                            cursor.style.width = '25px';
                            cursor.style.height = '25px';
                            cursor.style.background = 'transparent';
                        }
                    } else {
                        btn.style.transform = `translate(0, 0)`;
                    }
                }
            };

            window.addEventListener('mousemove', handleMove, { passive: true });
            window.addEventListener('touchstart', handleMove, { passive: true });
            window.addEventListener('touchmove', handleMove, { passive: true });

            btn.addEventListener('click', () => {
                preloader.classList.add('exit-ritual');
                mainContent.classList.remove('opacity-0', 'pointer-events-none');
                mainContent.classList.add('opacity-100');

                setTimeout(() => {
                    preloader.style.display = 'none';
                    document.body.classList.remove('overflow-hidden');
                    document.body.style.overflow = 'auto'; 
                }, 850);
            });
        });
    </script>
</body>
</html>
